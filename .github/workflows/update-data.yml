name: Swimming Club Data Update
on:
  repository_dispatch:
    types: [swim-update]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      - name: Decode and write data
        env:
          DATA_B64: ${{ github.event.client_payload.data_b64 }}
        run: echo "$DATA_B64" | base64 -d > data.json
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || (git commit -m "Update club data" && git push)  
